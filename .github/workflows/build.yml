name: Build
on:
  push:
    branches: ['**']
  pull_request:
env:
  app_id: plugin.audio.koshelf

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout addon
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build zip (includes syntax check)
        run: ./build.sh --output "${{ github.workspace }}/artifacts"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.app_id }}
          path: ${{ github.workspace }}/artifacts/*.zip
